<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Costos</title>
</head>
<body>
    <header>
        <h1>Simulador de Costos</h1>
    </header>
    <main>
        <section>
            <p>Este simulador te permite calcular un costo final basado en un costo base y un porcentaje de incremento.</p>
            <button onclick="iniciarSimulacion()">Iniciar Simulación</button>
        </section>
        <section>
            <h2>Histórico de Simulaciones</h2>
            <p>El historial se mostrará en la consola del navegador.</p>
        </section>
    </main>
    <footer>
        <p>Simulador de Costos - Proyecto</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
